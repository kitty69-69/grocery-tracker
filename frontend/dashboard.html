<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grocery Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tracker-card">

  <!-- Top Right Menu -->
  <div class="d-flex justify-content-end">

    <div class="dropdown">

      <button
        class="btn btn-outline-success"
        type="button"
        data-bs-toggle="dropdown"
      >
        ☰
      </button>

      <ul class="dropdown-menu dropdown-menu-end">

        <li>
          <a
            class="dropdown-item"
            href="#"
            onclick="togglePasswordMenu()"
          >
            Change Password
          </a>
        </li>

        <li><hr class="dropdown-divider"></li>

        <li>
          <a
            class="dropdown-item text-danger"
            href="#"
            onclick="logout()"
          >
            Logout
          </a>
        </li>

      </ul>

    </div>

  </div>

  <div class="text-center">

    <div class="basket-icon">🛒</div>

    <h1>Grocery Tracker</h1>

    <p class="subtitle" id="userInfo">Loading...</p>

    <button id="themeToggle" class="btn btn-outline-success mb-4">
      🌙 Dark Mode
    </button>

  </div>

  <form id="groceryForm">

    <input
      type="text"
      id="itemName"
      class="form-control mb-3"
      placeholder="Item name"
      required
    >

    <input
      type="number"
      id="quantity"
      class="form-control mb-3"
      placeholder="Quantity"
      required
    >

    <input
      type="number"
      id="price"
      class="form-control mb-3"
      placeholder="Price"
      step="0.01"
      required
    >

    <select id="category" class="form-control mb-3" required>

      <option value="Other">Select Category</option>
      <option value="Produce">Produce</option>
      <option value="Dairy">Dairy</option>
      <option value="Meat">Meat</option>
      <option value="Snacks">Snacks</option>
      <option value="Drinks">Drinks</option>
      <option value="Other">Other</option>

    </select>

    <button class="btn login-btn w-100" type="submit">
      Add Item
    </button>

  </form>

  <hr>

  <input
    type="text"
    id="searchInput"
    class="form-control mb-3"
    placeholder="Search grocery items..."
  >

  <div class="d-flex gap-2 mb-3">

    <select id="categoryFilter" class="form-control">

      <option value="All">All Categories</option>
      <option value="Produce">Produce</option>
      <option value="Dairy">Dairy</option>
      <option value="Meat">Meat</option>
      <option value="Snacks">Snacks</option>
      <option value="Drinks">Drinks</option>
      <option value="Other">Other</option>

    </select>

    <button id="sortBtn" class="btn btn-outline-success">
      Sort A-Z
    </button>

  </div>

  <h4>My Grocery List</h4>

  <table class="table mt-3">

    <thead>

      <tr>

        <th>Done</th>
        <th>Item</th>
        <th>Category</th>
        <th>Qty</th>
        <th>Price</th>
        <th></th>

      </tr>

    </thead>

    <tbody id="groceryList"></tbody>

  </table>

  <h4>Total: $<span id="totalAmount">0.00</span></h4>

  <!-- Hidden Password Panel -->

  <div
    id="passwordPanel"
    class="card mt-4 p-3"
    style="display:none;"
  >

    <h5>Change Password</h5>

    <input
      type="password"
      id="oldPassword"
      class="form-control mb-3"
      placeholder="Old Password"
    >

    <input
      type="password"
      id="newPassword"
      class="form-control mb-3"
      placeholder="New Password"
    >

    <button
      class="btn btn-warning w-100"
      onclick="changePassword()"
    >
      Change Password
    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
